<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTC Stops ArcGIS-Style Basemap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="ttc_metric_layers.js"></script>
  <style>
    html, body, #map { height: 100%; width: 100%; margin: 0; }
    body { background: #efeee7; font-family: Arial, Helvetica, sans-serif; }
    #map { background: #e8e4d8; }
    .legend { background: rgba(255,255,255,.94); color: #666; min-width: 210px; max-width: calc(100vw - 28px); padding: 18px 20px 20px; box-shadow: 0 1px 10px rgba(0,0,0,.10); border: 1px solid rgba(0,0,0,.04); line-height: 1.2; }
    .legend-title { color: #3f3f3f; font-size: 17px; font-weight: 700; margin: 0 0 16px; white-space: nowrap; }
    .legend-row { display: flex; align-items: center; gap: 12px; font-size: 14px; margin: 13px 0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; box-shadow: 0 0 0 1px rgba(255,255,255,.72), 0 0 0 2px rgba(0,0,0,.04); flex: 0 0 auto; }
    .leaflet-control-layers { border: 0 !important; border-radius: 0 !important; box-shadow: 0 1px 10px rgba(0,0,0,.12) !important; color: #555; font: 13px Arial, Helvetica, sans-serif; }
    .leaflet-control-zoom a { color: #555 !important; border-color: #ddd !important; }
    .leaflet-popup-content-wrapper { border-radius: 3px; color: #444; }
    .leaflet-popup-content { margin: 10px 12px; font-size: 13px; }
    .popup-title { font-weight: 700; margin-bottom: 4px; color: #333; }
    .popup-meta { color: #777; line-height: 1.35; }
    .view-tabs { background: rgba(255,255,255,.94); box-shadow: 0 1px 10px rgba(0,0,0,.10); display: flex; flex-wrap: wrap; max-width: min(390px, calc(100vw - 24px)); overflow: hidden; }
    .view-tab { background: transparent; border: 0; color: #666; cursor: pointer; font: 700 13px Arial, Helvetica, sans-serif; padding: 10px 14px; }
    .view-tab.active { background: #444; color: #fff; }
    .legend-scale { width: 148px; height: 9px; background: linear-gradient(90deg, #3b82f6, #facc15, #ef4444); border: 1px solid rgba(0,0,0,.10); }
    .legend-note { color: #777; font-size: 12px; margin-top: 10px; }
    @media (max-width: 640px) {
      .legend { min-width: 0; padding: 13px 14px 14px; }
      .legend-title { font-size: 15px; margin-bottom: 10px; }
      .legend-row { font-size: 13px; gap: 9px; margin: 9px 0; }
      .view-tab { font-size: 12px; padding: 9px 12px; }
      .leaflet-top.leaflet-right { top: auto; bottom: 12px; }
      .leaflet-top.leaflet-right .leaflet-control { margin-top: 0; margin-bottom: 10px; }
    }
  </style>

    function routeKey(value) {
      const text = String(value || '').trim().toUpperCase().replace(/\.0$/, '');
      const match = text.match(/^(\d+[A-Z]?)/);
      return match ? match[1] : text;
    }
    function stationKey(value) {
      return String(value || '').toUpperCase().replace(/\b(STATION|STN|SUBWAY|PLATFORM|LOWER|UPPER)\b/g, ' ').replace(/[^A-Z0-9]+/g, ' ').trim().replace(/\s+/g, ' ');

      if (view === 'hubs') return Number(metrics.hubByStopId?.[stop[4]]?.score) || 0;

    }
